name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version_bump:
        description: "Version bump to release from the latest stable vMAJOR.MINOR.PATCH tag"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      release_channel:
        description: "Release channel"
        required: true
        type: choice
        default: stable
        options:
          - stable
          - beta

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && format('{0}-{1}-{2}', github.ref_name, inputs.version_bump, inputs.release_channel) || github.ref_name }}

permissions:
  contents: write
  packages: write

env:
  LOOPER_BUILD_MIN_CLI_FOR_DAEMON: "0.2.0"
  LOOPER_BUILD_MIN_DAEMON_FOR_CLI: "0.2.0"

jobs:
  sandbox-preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      LOOPER_E2E_GITHUB: "1"
      LOOPER_E2E_SANDBOX_REPO: ${{ vars.LOOPER_E2E_SANDBOX_REPO != '' && vars.LOOPER_E2E_SANDBOX_REPO || 'nexu-io/looper-sandbox' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Resolve sandbox repository target
        id: sandbox-repo
        shell: bash
        run: |
          repo="${LOOPER_E2E_SANDBOX_REPO}"
          owner="${repo%%/*}"
          name="${repo#*/}"
          if [ -z "$owner" ] || [ -z "$name" ] || [ "$owner" = "$repo" ]; then
            printf 'LOOPER_E2E_SANDBOX_REPO must use owner/repo format, got %s\n' "$repo" >&2
            exit 1
          fi
          printf 'owner=%s\n' "$owner" >> "$GITHUB_OUTPUT"
          printf 'repo=%s\n' "$name" >> "$GITHUB_OUTPUT"

      - name: Mint sandbox GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.LOOPER_E2E_GITHUB_APP_ID }}
          private-key: ${{ secrets.LOOPER_E2E_GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ steps.sandbox-repo.outputs.owner }}
          repositories: |
            ${{ steps.sandbox-repo.outputs.repo }}

      - name: Run GitHub sandbox preflight E2E
        env:
          LOOPER_E2E_ARTIFACT_ROOT: ${{ runner.temp }}/looper-e2e/release-sandbox-preflight
          LOOPER_E2E_GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: go test ./internal/e2e -run '^TestGitHubSandbox' -count=1

      - name: Upload sandbox preflight artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-sandbox-preflight-artifacts
          path: ${{ runner.temp }}/looper-e2e/release-sandbox-preflight
          if-no-files-found: ignore

  prepare-go-release:
    needs: sandbox-preflight
    runs-on: ubuntu-latest

    outputs:
      release-tag: ${{ steps.release-version.outputs.tag }}
      release-version: ${{ steps.release-version.outputs.value }}
      release-channel: ${{ steps.release-version.outputs.channel }}
      release-prerelease: ${{ steps.release-version.outputs.prerelease }}
      release-timestamp: ${{ steps.release-version.outputs.released }}
      release-commit: ${{ steps.release-commit.outputs.sha }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Pin release commit
        id: release-commit
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check formatting
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            printf 'These files need gofmt:\n%s\n' "$unformatted"
            exit 1
          fi

      - name: Lint
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Read release version and channel
        id: release-version
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          VERSION_BUMP: ${{ inputs.version_bump }}
          RELEASE_CHANNEL: ${{ inputs.release_channel }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            latest_tag=""
            while IFS= read -r candidate_tag; do
              if [[ "$candidate_tag" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
                latest_tag="$candidate_tag"
                major="${BASH_REMATCH[1]}"
                minor="${BASH_REMATCH[2]}"
                patch="${BASH_REMATCH[3]}"
                break
              fi
            done < <(git tag --list 'v*' --sort=-v:refname)

            if [ -z "$latest_tag" ]; then
              major=0
              minor=0
              patch=0
            fi

            case "$VERSION_BUMP" in
              patch)
                patch=$((patch + 1))
                ;;
              minor)
                minor=$((minor + 1))
                patch=0
                ;;
              major)
                major=$((major + 1))
                minor=0
                patch=0
                ;;
              *)
                echo "version_bump must be one of: patch, minor, major" >&2
                exit 1
                ;;
            esac

            base_version="${major}.${minor}.${patch}"
            case "$RELEASE_CHANNEL" in
              stable)
                tag_name="v${base_version}"
                if git rev-parse -q --verify "refs/tags/${tag_name}" >/dev/null; then
                  echo "Calculated tag already exists: ${tag_name}" >&2
                  exit 1
                fi
                ;;
              beta)
                next_beta=1
                while IFS= read -r candidate_tag; do
                  if [[ "$candidate_tag" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)-beta\.([0-9]+)$ ]] && \
                    [ "${BASH_REMATCH[1]}" = "$major" ] && \
                    [ "${BASH_REMATCH[2]}" = "$minor" ] && \
                    [ "${BASH_REMATCH[3]}" = "$patch" ]; then
                    beta_number="${BASH_REMATCH[4]}"
                    if [ "$beta_number" -ge "$next_beta" ]; then
                      next_beta=$((beta_number + 1))
                    fi
                  fi
                done < <(git tag --list "v${base_version}-beta.*")

                tag_name="v${base_version}-beta.${next_beta}"
                ;;
              *)
                echo "release_channel must be one of: stable, beta" >&2
                exit 1
                ;;
            esac
          else
            tag_name="$REF_NAME"
          fi

          if [[ ! "$tag_name" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag must match vMAJOR.MINOR.PATCH[-PRERELEASE]: ${tag_name}" >&2
            exit 1
          fi
          release_version="${tag_name#v}"
          channel="stable"
          prerelease="false"
          if [[ "$release_version" == *-* ]]; then
            channel="beta"
            prerelease="true"
          fi
          released="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          {
            echo "tag=${tag_name}"
            echo "value=${release_version}"
            echo "channel=${channel}"
            echo "prerelease=${prerelease}"
            echo "released=${released}"
          } >> "$GITHUB_OUTPUT"

      - name: Build
        env:
          LOOPER_BUILD_VERSION: ${{ steps.release-version.outputs.value }}
          LOOPER_BUILD_VERSION_SOURCE: git-tag:${{ steps.release-version.outputs.tag }}
          LOOPER_BUILD_CHANNEL: ${{ steps.release-version.outputs.channel }}
          LOOPER_BUILD_API_VERSION: v1
        run: |
          looper_build_git_sha="$(git rev-parse HEAD)"
          looper_build_timestamp="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          export LOOPER_BUILD_GIT_SHA="$looper_build_git_sha"
          export LOOPER_BUILD_TIMESTAMP="$looper_build_timestamp"
          go build -ldflags "$(go run ./tools/go-build-flags)" ./...

      - name: Create Git tag for manual release
        if: github.event_name == 'workflow_dispatch'
        env:
          RELEASE_TAG: ${{ steps.release-version.outputs.tag }}
        run: |
          git tag "$RELEASE_TAG" HEAD
          git push origin "refs/tags/${RELEASE_TAG}"

  create-draft-release:
    needs: prepare-go-release
    runs-on: ubuntu-latest

    steps:
      - name: Check for existing GitHub release
        id: existing-release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.prepare-go-release.outputs.release-tag }}
        run: |
          response_file="$(mktemp)"
          status="$(curl --silent --show-error --output "$response_file" --write-out "%{http_code}" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GH_REPO}/releases/tags/${RELEASE_TAG}")"

          case "$status" in
            200)
              echo "exists=true" >> "$GITHUB_OUTPUT"
              ;;
            404)
              echo "exists=false" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Failed to check release ${RELEASE_TAG}; GitHub API returned HTTP ${status}." >&2
              cat "$response_file" >&2
              exit 1
              ;;
          esac

      - name: Create draft GitHub release
        if: steps.existing-release.outputs.exists != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-go-release.outputs.release-tag }}
          name: Looper ${{ needs.prepare-go-release.outputs.release-tag }}
          draft: true
          prerelease: ${{ needs.prepare-go-release.outputs.release-prerelease }}
          generate_release_notes: true

  build-looper:
    needs:
      - sandbox-preflight
      - prepare-go-release
      - create-draft-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            runner: macos-14
            goos: darwin
            goarch: arm64
            artifact-name: looper-darwin-arm64
          - target: linux-amd64
            runner: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact-name: looper-linux-amd64
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-go-release.outputs.release-commit }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build looper for ${{ matrix.target }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          LOOPER_BUILD_VERSION: ${{ needs.prepare-go-release.outputs.release-version }}
          LOOPER_BUILD_VERSION_SOURCE: git-tag:${{ needs.prepare-go-release.outputs.release-tag }}
          LOOPER_BUILD_CHANNEL: ${{ needs.prepare-go-release.outputs.release-channel }}
          LOOPER_BUILD_API_VERSION: v1
        run: |
          looper_build_git_sha="$(git rev-parse HEAD)"
          looper_build_timestamp="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          export LOOPER_BUILD_GIT_SHA="$looper_build_git_sha"
          export LOOPER_BUILD_TIMESTAMP="$looper_build_timestamp"
          mkdir -p dist/release
          go build -trimpath -ldflags "$(go run ./tools/go-build-flags)" -o "dist/release/${{ matrix.artifact-name }}" ./cmd/looper

      - name: Verify built binary exists
        run: test -f "dist/release/${{ matrix.artifact-name }}"

      - name: Verify looper binary version
        env:
          EXPECTED_VERSION: ${{ needs.prepare-go-release.outputs.release-version }}
        run: |
          artifact_path="dist/release/${{ matrix.artifact-name }}"
          actual_version=$("$artifact_path" --version)
          if [ "$actual_version" != "$EXPECTED_VERSION" ]; then
            echo "Expected $artifact_path --version to print ${EXPECTED_VERSION}, got ${actual_version}." >&2
            exit 1
          fi

      - name: Create release archive
        working-directory: dist/release
        run: |
          # Tar with -C so the binary lives at the archive root with its
          # platform-suffixed name. Compressed downloads are roughly 30-40% of
          # the raw binary size, which speeds up first install and self-upgrade.
          tar -czf "${{ matrix.artifact-name }}.tar.gz" "${{ matrix.artifact-name }}"
          shasum -a 256 "${{ matrix.artifact-name }}.tar.gz" > "${{ matrix.artifact-name }}.tar.gz.sha256"
          shasum -a 256 -c "${{ matrix.artifact-name }}.tar.gz.sha256"

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: looper-release-assets-${{ matrix.target }}
          path: |
            dist/release/${{ matrix.artifact-name }}.tar.gz
            dist/release/${{ matrix.artifact-name }}.tar.gz.sha256

  build-looperd:
    needs:
      - sandbox-preflight
      - prepare-go-release
      - create-draft-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            runner: macos-14
            goos: darwin
            goarch: arm64
            artifact-name: looperd-darwin-arm64
          - target: linux-amd64
            runner: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact-name: looperd-linux-amd64
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-go-release.outputs.release-commit }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build looperd for ${{ matrix.target }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          LOOPER_BUILD_VERSION: ${{ needs.prepare-go-release.outputs.release-version }}
          LOOPER_BUILD_VERSION_SOURCE: git-tag:${{ needs.prepare-go-release.outputs.release-tag }}
          LOOPER_BUILD_CHANNEL: ${{ needs.prepare-go-release.outputs.release-channel }}
          LOOPER_BUILD_API_VERSION: v1
        run: |
          looper_build_git_sha="$(git rev-parse HEAD)"
          looper_build_timestamp="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          export LOOPER_BUILD_GIT_SHA="$looper_build_git_sha"
          export LOOPER_BUILD_TIMESTAMP="$looper_build_timestamp"
          mkdir -p dist/release
          go build -trimpath -ldflags "$(go run ./tools/go-build-flags)" -o "dist/release/${{ matrix.artifact-name }}" ./cmd/looperd

      - name: Verify built binary version
        env:
          EXPECTED_VERSION: ${{ needs.prepare-go-release.outputs.release-version }}
        run: |
          artifact_path="dist/release/${{ matrix.artifact-name }}"
          actual_version=$("$artifact_path" --version)
          if [ "$actual_version" != "$EXPECTED_VERSION" ]; then
            echo "Expected $artifact_path --version to print ${EXPECTED_VERSION}, got ${actual_version}." >&2
            exit 1
          fi

      - name: Create release archive
        working-directory: dist/release
        run: |
          tar -czf "${{ matrix.artifact-name }}.tar.gz" "${{ matrix.artifact-name }}"
          shasum -a 256 "${{ matrix.artifact-name }}.tar.gz" > "${{ matrix.artifact-name }}.tar.gz.sha256"
          shasum -a 256 -c "${{ matrix.artifact-name }}.tar.gz.sha256"

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: looperd-release-assets-${{ matrix.target }}
          path: |
            dist/release/${{ matrix.artifact-name }}.tar.gz
            dist/release/${{ matrix.artifact-name }}.tar.gz.sha256

  publish-loopernet-image:
    needs:
      - sandbox-preflight
      - prepare-go-release
      - create-draft-release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-go-release.outputs.release-commit }}

      - name: Verify loopernet Dockerfile exists
        run: test -f deploy/loopernet/Dockerfile

      - name: Derive image coordinates
        id: image
        env:
          OWNER: ${{ github.repository_owner }}
        run: |
          owner_lower="$(printf '%s' "$OWNER" | tr '[:upper:]' '[:lower:]')"
          echo "name=ghcr.io/${owner_lower}/loopernet" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=${{ needs.prepare-go-release.outputs.release-version }}
            type=raw,value=${{ needs.prepare-go-release.outputs.release-tag }}
            type=raw,value=latest,enable=${{ needs.prepare-go-release.outputs.release-channel == 'stable' }}
          labels: |
            org.opencontainers.image.title=loopernet
            org.opencontainers.image.description=Looper routed-network coordination service
            org.opencontainers.image.version=${{ needs.prepare-go-release.outputs.release-version }}
            org.opencontainers.image.revision=${{ needs.prepare-go-release.outputs.release-commit }}

      - name: Build and push loopernet image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./deploy/loopernet/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          build-args: |
            LOOPER_BUILD_VERSION=${{ needs.prepare-go-release.outputs.release-version }}
            LOOPER_BUILD_VERSION_SOURCE=git-tag:${{ needs.prepare-go-release.outputs.release-tag }}
            LOOPER_BUILD_CHANNEL=${{ needs.prepare-go-release.outputs.release-channel }}
            LOOPER_BUILD_API_VERSION=v1
            LOOPER_BUILD_GIT_SHA=${{ needs.prepare-go-release.outputs.release-commit }}
            LOOPER_BUILD_TIMESTAMP=${{ needs.prepare-go-release.outputs.release-timestamp }}

  publish-release:
    needs:
      - prepare-go-release
      - build-looper
      - build-looperd
      - publish-loopernet-image
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-go-release.outputs.release-commit }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download compiled artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*-release-assets-*"
          merge-multiple: true
          path: release-assets

      - name: Verify predictable asset names
        run: |
          test -f release-assets/looper-darwin-arm64.tar.gz
          test -f release-assets/looper-darwin-arm64.tar.gz.sha256
          test -f release-assets/looper-linux-amd64.tar.gz
          test -f release-assets/looper-linux-amd64.tar.gz.sha256
          test -f release-assets/looperd-darwin-arm64.tar.gz
          test -f release-assets/looperd-darwin-arm64.tar.gz.sha256
          test -f release-assets/looperd-linux-amd64.tar.gz
          test -f release-assets/looperd-linux-amd64.tar.gz.sha256

      - name: Generate release manifest
        run: |
          go run ./tools/release-manifest \
            -tag "${{ needs.prepare-go-release.outputs.release-tag }}" \
            -version "${{ needs.prepare-go-release.outputs.release-version }}" \
            -released "${{ needs.prepare-go-release.outputs.release-timestamp }}" \
            -channel "${{ needs.prepare-go-release.outputs.release-channel }}" \
            -api-version v1 \
            -min-cli-for-daemon "$LOOPER_BUILD_MIN_CLI_FOR_DAEMON" \
            -min-daemon-for-cli "$LOOPER_BUILD_MIN_DAEMON_FOR_CLI" \
            -assets-dir release-assets \
            -required-assets "looper-darwin-arm64.tar.gz,looper-linux-amd64.tar.gz,looperd-darwin-arm64.tar.gz,looperd-linux-amd64.tar.gz" \
            -output release-assets/manifest.json

      - name: Validate release manifest fields
        env:
          EXPECTED_TAG: ${{ needs.prepare-go-release.outputs.release-tag }}
          EXPECTED_VERSION: ${{ needs.prepare-go-release.outputs.release-version }}
          EXPECTED_CHANNEL: ${{ needs.prepare-go-release.outputs.release-channel }}
        run: |
          python3 - <<'PY'
          import json, os
          with open("release-assets/manifest.json", "r", encoding="utf-8") as f:
              m = json.load(f)
          assert m["manifestVersion"] == 1, f"manifestVersion mismatch: {m['manifestVersion']}"
          assert m["tag"] == os.environ["EXPECTED_TAG"], f"tag mismatch: {m['tag']}"
          assert m["version"] == os.environ["EXPECTED_VERSION"], f"version mismatch: {m['version']}"
          assert m["channel"] == os.environ["EXPECTED_CHANNEL"], f"channel mismatch: {m['channel']}"
          assert m["apiVersion"] == "v1", f"apiVersion mismatch: {m['apiVersion']}"
          migration_files = sorted(
              name for name in os.listdir("internal/storage/migrations")
              if name.endswith(".sql")
          )
          expected_schema_version = migration_files[-1].removesuffix(".sql")
          assert m["schemaVersion"] == expected_schema_version, f"schemaVersion mismatch: {m['schemaVersion']}"
          assert m["minCliForDaemon"], "minCliForDaemon missing"
          assert m["minDaemonForCli"], "minDaemonForCli missing"
          required = {
              "looper-darwin-arm64.tar.gz",
              "looper-linux-amd64.tar.gz",
              "looperd-darwin-arm64.tar.gz",
              "looperd-linux-amd64.tar.gz",
          }
          assert required.issubset(set(m["artifacts"].keys())), "manifest missing artifacts"
          for name in required:
              artifact = m["artifacts"][name]
              assert artifact["url"].endswith(f"/{os.environ['EXPECTED_TAG']}/{name}"), f"artifact URL mismatch for {name}: {artifact['url']}"
              sha = artifact["sha256"]
              assert len(sha) == 64 and all(c in "0123456789abcdef" for c in sha), f"artifact sha mismatch for {name}: {sha}"
          PY

      - name: Upload release assets to draft
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare-go-release.outputs.release-tag }}
        run: |
          python3 - <<'PY'
          import json, os, subprocess

          raw_assets = [
              "looper-darwin-arm64",
              "looper-darwin-arm64.sha256",
              "looper-linux-amd64",
              "looper-linux-amd64.sha256",
              "looperd-darwin-arm64",
              "looperd-darwin-arm64.sha256",
              "looperd-linux-amd64",
              "looperd-linux-amd64.sha256",
          ]
          release = json.loads(
              subprocess.run(
                  ["gh", "release", "view", os.environ["RELEASE_TAG"], "--json", "assets"],
                  check=True,
                  capture_output=True,
                  text=True,
              ).stdout
          )
          assets = {asset["name"] for asset in release["assets"]}
          for asset in raw_assets:
              if asset in assets:
                  subprocess.run(
                      ["gh", "release", "delete-asset", os.environ["RELEASE_TAG"], asset, "--yes"],
                      check=True,
                  )
          PY

          gh release upload "$RELEASE_TAG" \
            release-assets/looper-darwin-arm64.tar.gz \
            release-assets/looper-darwin-arm64.tar.gz.sha256 \
            release-assets/looper-linux-amd64.tar.gz \
            release-assets/looper-linux-amd64.tar.gz.sha256 \
            release-assets/looperd-darwin-arm64.tar.gz \
            release-assets/looperd-darwin-arm64.tar.gz.sha256 \
            release-assets/looperd-linux-amd64.tar.gz \
            release-assets/looperd-linux-amd64.tar.gz.sha256 \
            release-assets/manifest.json \
            --clobber

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare-go-release.outputs.release-tag }}
        run: gh release edit "$RELEASE_TAG" --draft=false
