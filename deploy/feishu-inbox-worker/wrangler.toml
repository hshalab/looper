name = "looper-feishu-inbox"
main = "worker.js"
compatibility_date = "2024-11-01"

# Create the DB once:  wrangler d1 create looper-feishu-inbox
# then paste its id here, and apply the schema:
#   wrangler d1 execute looper-feishu-inbox --file=schema.sql --remote
[[d1_databases]]
binding = "DB"
database_name = "looper-feishu-inbox"
database_id = "REPLACE_WITH_D1_ID"

# Secrets (do NOT put values here — use `wrangler secret put`):
#   wrangler secret put FEISHU_VERIFY_TOKEN   # app Event Subscription Verification Token
#   wrangler secret put POLL_TOKEN            # shared secret loopers use to read /events
